<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biochemistry Revision Platform (500+ Question Pool)</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --correct-bg: #dcfce7;
            --correct-border: #16a34a;
            --correct-text: #14532d;
            --wrong-bg: #fee2e2;
            --wrong-border: #dc2626;
            --wrong-text: #7f1d1d;
            --tip-bg: #eff6ff;
            --tip-border: #3b82f6;
            --tip-text: #1e40af;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #e2e8f0;
        }

        h1 {
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
        }

        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 5px;
            display: block;
        }

        select, button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
            background-color: #fff;
            box-sizing: border-box;
        }

        button {
            background-color: var(--primary);
            color: white;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-dark);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            text-align: left;
            background-color: #f1f5f9;
            color: var(--text-main);
            border: 1px solid #e2e8f0;
            padding: 14px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: normal;
            transition: all 0.2s;
        }

        .option-btn:hover:not([disabled]) {
            background-color: #e2e8f0;
            border-color: #cbd5e1;
        }

        .option-btn.correct {
            background-color: var(--correct-bg) !important;
            border-color: var(--correct-border) !important;
            color: var(--correct-text) !important;
            font-weight: 600;
        }

        .option-btn.wrong {
            background-color: var(--wrong-bg) !important;
            border-color: var(--wrong-border) !important;
            color: var(--wrong-text) !important;
        }

        .feedback-box {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }

        .feedback-box.visible {
            display: block;
        }

        .feedback-box.correct {
            background-color: var(--correct-bg);
            border: 1px solid var(--correct-border);
            color: var(--correct-text);
        }

        .feedback-box.wrong {
            background-color: var(--wrong-bg);
            border: 1px solid var(--wrong-border);
            color: var(--wrong-text);
        }

        .tip-box {
            margin-top: 15px;
            padding: 14px;
            background-color: var(--tip-bg);
            border-left: 4px solid var(--tip-border);
            color: var(--tip-text);
            border-radius: 0 8px 8px 0;
            display: none;
            font-size: 0.95rem;
        }

        .tip-box.visible {
            display: block;
        }

        .action-btn {
            margin-top: 20px;
            display: none;
        }

        .action-btn.visible {
            display: block;
        }

        .badge {
            background-color: #e0e7ff;
            color: #3730a3;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Biochemistry Revision Platform</h1>
        <p class="subtitle">100 Questions per Unit | 200 Questions Total Curriculum Mode</p>
    </header>

    <!-- Selection Panel -->
    <div id="selection-card" class="card">
        <div class="control-panel">
            <div>
                <label for="unit-select">Select Practice Scope:</label>
                <select id="unit-select">
                    <option value="all">Entire Curriculum (200 Questions)</option>
                    <option value="1">Unit 1: Cells, Water and Buffers (100 Questions)</option>
                    <option value="2">Unit 2: Energy & Thermodynamics (100 Questions)</option>
                    <option value="3">Unit 3: Structure and Function (100 Questions)</option>
                    <option value="4">Unit 4: Catalysis & Enzyme Kinetics (100 Questions)</option>
                    <option value="5">Unit 5: Flow of Genetic Information (100 Questions)</option>
                </select>
            </div>
            <button id="start-btn">Start Practice Session</button>
        </div>
    </div>

    <!-- Quiz Engine Card -->
    <div id="quiz-card" class="card hidden">
        <div class="stats-bar">
            <span id="unit-badge" class="badge">Unit 1</span>
            <span>Question <span id="q-current">1</span> of <span id="q-total">100</span></span>
            <span>Score: <span id="score">0</span></span>
        </div>

        <div id="question" class="question-text">Loading question...</div>

        <div id="options" class="options-grid">
            <!-- Options rendered via JS -->
        </div>

        <div id="feedback" class="feedback-box"></div>
        <div id="tip" class="tip-box"></div>

        <button id="next-btn" class="action-btn">Next Question</button>
    </div>

    <!-- Summary Card -->
    <div id="summary-card" class="card hidden">
        <h2>Practice Session Complete!</h2>
        <p>You have finished your revision session.</p>
        <p style="font-size: 1.25rem; font-weight: bold;">Final Score: <span id="final-score">0</span> / <span id="final-total">0</span> (<span id="final-percent">0%</span>)</p>
        <button id="restart-btn">Start New Session</button>
    </div>
</div>

<script>
// ============================================================================
// QUESTION GENERATOR ENGINE (100 Questions per Unit = 500 total pool)
// ============================================================================

function generateQuestionPool() {
    const pool = { 1: [], 2: [], 3: [], 4: [], 5: [] };

    // UNIT 1 GENERATOR (Cells, Water, Buffers)
    const u1Acids = [
        { name: "Formic acid", pKa: 3.75 },
        { name: "Acetic acid", pKa: 4.76 },
        { name: "Lactic acid", pKa: 3.86 },
        { name: "Bicarbonate", pKa: 6.35 },
        { name: "Dihydrogen phosphate", pKa: 7.20 }
    ];

    u1Acids.forEach((acid, idx) => {
        for (let i = 0; i < 20; i++) {
            const delta = ((i % 5) - 2) * 0.5; // -1.0 to +1.0
            const targetPH = (acid.pKa + delta).toFixed(2);
            const ratio = Math.pow(10, delta);
            let ratioText = ratio < 1 ? `1:${Math.round(1/ratio)}` : `${Math.round(ratio)}:1`;
            if (delta === 0) ratioText = "1:1";

            let correctOpt = 0;
            let options = [];
            if (delta > 0) {
                options = [ratioText, `1:${Math.round(ratio * 10)}`, "1:1", `${Math.round(ratio * 5)}:1`];
                correctOpt = 0;
            } else if (delta < 0) {
                options = ["10:1", ratioText, "1:1", "100:1"];
                correctOpt = 1;
            } else {
                options = ["10:1", "1:10", ratioText, "100:1"];
                correctOpt = 2;
            }

            pool[1].push({
                unit: 1,
                question: `A biological buffer containing ${acid.name} (pKa = ${acid.pKa}) is prepared at pH ${targetPH}. What is the expected ratio of conjugate base to weak acid ([A⁻]/[HA])?`,
                options: options,
                correct: correctOpt,
                tip: `Use Henderson-Hasselbalch: pH = pKa + log([A⁻]/[HA]). Difference = pH - pKa = ${delta.toFixed(2)}. Thus [A⁻]/[HA] = 10^(${delta.toFixed(2)}) = ${ratioText}.`
            });
        }
    });

    // UNIT 2 GENERATOR (Energy & Thermodynamics)
    for (let i = 0; i < 100; i++) {
        const dG = -30.5 + (i % 10) * 3; // varying standard free energies
        const isExergonic = dG < 0;
        const qNum = i + 1;

        if (i % 4 === 0) {
            pool[2].push({
                unit: 2,
                question: `A biochemical reaction has a standard free energy change (ΔG°') of ${dG.toFixed(1)} kJ/mol. Which statement best describes the equilibrium state?`,
                options: [
                    isExergonic ? "The reaction is exergonic, spontaneous, and favors product formation (Keq > 1)." : "The reaction is endergonic, non-spontaneous, and favors reactants (Keq < 1).",
                    isExergonic ? "The reaction is endergonic and requires ATP input." : "The reaction is exergonic and releases heat.",
                    "The reaction is at strict thermodynamic equilibrium (ΔG°' = 0).",
                    "Enzymes can alter this ΔG°' value to make it negative."
                ],
                correct: 0,
                tip: "Negative ΔG means exergonic/spontaneous (Keq > 1). Positive ΔG means endergonic/non-spontaneous (Keq < 1). Enzymes lower activation energy but NEVER change ΔG."
            });
        } else if (i % 4 === 1) {
            pool[2].push({
                unit: 2,
                question: `In oxidative phosphorylation, if an uncoupling agent renders the inner mitochondrial membrane permeable to protons, what is the immediate kinetic consequence?`,
                options: [
                    "ATP synthesis increases while oxygen consumption stops.",
                    "Electron transport continues, but ATP synthesis stops and energy dissipates as heat.",
                    "NADH oxidation completely ceases.",
                    "Pyruvate dehydrogenase is irreversibly inhibited."
                ],
                correct: 1,
                tip: "Uncouplers collapse the proton motive force gradient across the inner membrane. Electron transport runs uninhibited, releasing free energy strictly as heat."
            });
        } else if (i % 4 === 2) {
            pool[2].push({
                unit: 2,
                question: `When comparing substrate-level phosphorylation to oxidative phosphorylation, which mechanism produces the majority of ATP in aerobic cellular respiration?`,
                options: [
                    "Substrate-level phosphorylation in the cytosol.",
                    "Oxidative phosphorylation driven by the mitochondrial proton gradient.",
                    "Photophosphorylation via thylakoid membranes.",
                    "Direct hydrolysis of phosphocreatine."
                ],
                correct: 1,
                tip: "Oxidative phosphorylation generates ~28-30 ATP per glucose using electron flow through Complexes I-IV and ATP Synthase, far outstripping substrate-level yields."
            });
        } else {
            pool[2].push({
                unit: 2,
                question: `During rapid muscular contraction, phosphocreatine transfers its high-energy phosphate group to ADP. Which enzyme catalyzes this rapid ATP regeneration?`,
                options: [
                    "Pyruvate kinase",
                    "Adenylate cyclase",
                    "Creatine kinase",
                    "Hexokinase"
                ],
                correct: 2,
                tip: "Creatine kinase converts phosphocreatine + ADP ⇌ creatine + ATP, serving as an immediate high-energy buffer during high ATP demand."
            });
        }
    }

    // UNIT 3 GENERATOR (Structure & Function - Proteins, Nucleic Acids, Lipids)
    const aaPairs = [
        { orig: "Alanine", mut: "Valine", effect: "increases steric crowding in the hydrophobic core" },
        { orig: "Isoleucine", mut: "Glycine", effect: "creates a cavity/void in the core" },
        { orig: "Proline", mut: "Alanine", effect: "relieves backbone dihedral angle restriction in α-helices" },
        { orig: "Glutamate", mut: "Lysine", effect: "reverses side-chain charge from negative to positive" }
    ];

    for (let i = 0; i < 100; i++) {
        const aa = aaPairs[i % aaPairs.length];
        if (i % 3 === 0) {
            pool[3].push({
                unit: 3,
                question: `A site-directed mutagenesis experiment substitutes ${aa.orig} with ${aa.mut} in a globular protein core. What primary structural effect accounts for altered stability?`,
                options: [
                    `The substitution ${aa.effect}, disrupting tertiary packing.`,
                    "It forces the formation of inter-chain disulfide bonds.",
                    "It converts the protein into a β-elimination state.",
                    "It prevents peptide bond formation during translation."
                ],
                correct: 0,
                tip: "Proteins depend on precise hydrophobic packing in their native core. Altering residue size or charge disrupts tertiary stabilization forces."
            });
        } else if (i % 3 === 1) {
            pool[3].push({
                unit: 3,
                question: `Why does DNA rich in Guanine-Cytosine (G-C) content exhibit a significantly higher thermal melting point (Tm) than Adenine-Thymine (A-T) rich DNA?`,
                options: [
                    "G-C pairs form 3 hydrogen bonds and superior base-stacking interactions compared to 2 H-bonds in A-T pairs.",
                    "G-C pairs contain ribose sugars which form covalent inter-strand bridges.",
                    "A-T pairs lack purine bases.",
                    "G-C rich DNA forms Z-DNA exclusively in aqueous solutions."
                ],
                correct: 0,
                tip: "G-C base pairing involves 3 hydrogen bonds and stronger base-stacking orbital overlaps, requiring significantly more thermal energy to denature strands."
            });
        } else {
            pool[3].push({
                unit: 3,
                question: `Why are saturated fatty acids solid at room temperature while unsaturated fatty acids (with cis double bonds) remain liquid?`,
                options: [
                    "Saturated fatty acids lack double bonds, allowing linear hydrocarbon chains to pack tightly with higher van der Waals interactions.",
                    "Cis double bonds in saturated fatty acids create rigid linear structures.",
                    "Unsaturated fatty acids form covalent networks with glycerols.",
                    "Saturated fatty acids contain fewer total carbon atoms."
                ],
                correct: 0,
                tip: "Straight-chain saturated fatty acids pack densely. Cis double bonds introduce sharp kinks that prevent tight packing, lowering melting points."
            });
        }
    }

    // UNIT 4 GENERATOR (Catalysis & Enzyme Kinetics)
    for (let i = 0; i < 100; i++) {
        const kmVal = (2.0 + (i % 8) * 0.5).toFixed(1);
        const vmaxVal = (50 + (i % 5) * 10);

        if (i % 4 === 0) {
            pool[4].push({
                unit: 4,
                question: `An enzyme inhibitor increases the apparent Km from ${kmVal} mM to ${(kmVal*2).toFixed(1)} mM while leaving Vmax unchanged at ${vmaxVal} µmol/min. What type of inhibition is occurring?`,
                options: [
                    "Competitive inhibition",
                    "Non-competitive inhibition",
                    "Uncompetitive inhibition",
                    "Suicide/Irreversible inhibition"
                ],
                correct: 0,
                tip: "Competitive inhibitors bind to the active site: Km increases (lower apparent substrate affinity) but high [S] can overcome it, so Vmax is unchanged."
            });
        } else if (i % 4 === 1) {
            pool[4].push({
                unit: 4,
                question: `An inhibitor decreases Vmax from ${vmaxVal} to ${Math.round(vmaxVal/2)} µmol/min but leaves Km unchanged at ${kmVal} mM. Which statement describes this mechanism?`,
                options: [
                    "Non-competitive inhibitor binding an allosteric site regardless of substrate presence.",
                    "Competitive inhibitor competing directly at the substrate binding pocket.",
                    "Uncompetitive inhibitor binding only to the ES complex.",
                    "Zymogen proteolytic cleavage."
                ],
                correct: 0,
                tip: "Non-competitive inhibitors bind allosteric sites on E or ES complex, reducing catalytic efficiency (lowering Vmax) without affecting substrate binding affinity (Km unchanged)."
            });
        } else if (i % 4 === 2) {
            pool[4].push({
                unit: 4,
                question: `Why does Penicillin act as a suicide (mechanism-based) inhibitor against bacterial D-D transpeptidase?`,
                options: [
                    "It forms a covalent, irreversible adduct with an active site serine during catalytic attempt.",
                    "It non-covalently competes for free zinc ions.",
                    "It hydrolyzes the bacterial cell membrane phospholipids.",
                    "It acts as a reversible allosteric effector."
                ],
                correct: 0,
                tip: "Suicide inhibitors mimic substrate structure; during catalysis, the enzyme converts the inhibitor into a reactive intermediate that permanently covalently bonds the active site."
            });
        } else {
            pool[4].push({
                unit: 4,
                question: `If Enzyme A has Km = 0.5 mM and Enzyme B has Km = 5.0 mM for the same physiological substrate, which enzyme has higher substrate affinity under low [S]?`,
                options: [
                    "Enzyme A (Lower Km = Higher Affinity)",
                    "Enzyme B (Higher Km = Higher Affinity)",
                    "Both enzymes operate at identical rates",
                    "Enzyme B because Vmax must be higher"
                ],
                correct: 0,
                tip: "Km is inversely related to substrate affinity. Lower Km means half-maximal velocity is achieved at lower substrate concentrations."
            });
        }
    }

    // UNIT 5 GENERATOR (Flow of Genetic Information)
    for (let i = 0; i < 100; i++) {
        const aaCount = 50 + (i % 10) * 10; // e.g. 50, 60, ... 140 aa
        const highEnergyBonds = (aaCount * 4) - 1; // 2 per tRNA charge (2*N) + 1 init + 2*(N-1) elong = 4N - 1

        if (i % 4 === 0) {
            pool[5].push({
                unit: 5,
                question: `How many high-energy phosphate bonds (ATP/GTP equivalents) are required to synthesize a polypeptide containing ${aaCount} amino acids during translation?`,
                options: [
                    `${highEnergyBonds} high-energy bonds`,
                    `${aaCount * 2} high-energy bonds`,
                    `${aaCount * 3} high-energy bonds`,
                    `${aaCount * 5} high-energy bonds`
                ],
                correct: 0,
                tip: `Calculation: tRNA charging = 2×${aaCount} = ${2*aaCount} ATP equivalents; Initiation = 1 GTP; Elongation = 2×(${aaCount}-1) = ${2*(aaCount-1)} GTP. Total = ${highEnergyBonds} bonds.`
            });
        } else if (i % 4 === 1) {
            pool[5].push({
                unit: 5,
                question: `During bacterial DNA replication, why is the leading strand synthesized continuously while the lagging strand is synthesized discontinuously as Okazaki fragments?`,
                options: [
                    "DNA Polymerase can only synthesize DNA in the 5' → 3' direction relative to the template.",
                    "RNA Primase only exists on the leading strand.",
                    "DNA Ligase blocks continuous synthesis on the lagging strand.",
                    "Single-strand binding proteins prevent continuous polymerization."
                ],
                correct: 0,
                tip: "DNA Polymerase adds nucleotides strictly to the 3'-OH group (5'→3' direction). Because template strands are antiparallel, the lagging strand must synthesize away from the fork in short fragments."
            });
        } else if (i % 4 === 2) {
            pool[5].push({
                unit: 5,
                question: `How does the MutS/MutL mismatch repair system in E. coli distinguish between the parental template strand and the newly synthesized daughter strand containing a replication error?`,
                options: [
                    "The original parental DNA strand is methylated at GATC sites; the newly synthesized strand is temporarily unmethylated.",
                    "The daughter strand contains uracil instead of thymine.",
                    "The parental strand is bound to histones.",
                    "The daughter strand lacks phosphodiester backbone continuity."
                ],
                correct: 0,
                tip: "Dam methylase methylates adenines in GATC sequences. Hemimethylation immediately following replication allows Mut proteins to target and excise errors on the unmethylated strand."
            });
        } else {
            pool[5].push({
                unit: 5,
                question: `What is the role of the 5' 7-methylguanosine cap and 3' poly(A) tail added during eukaryotic pre-mRNA processing?`,
                options: [
                    "They protect mRNA from exonuclease degradation and facilitate nuclear export and ribosome recruitment.",
                    "They encode introns that are translated into regulatory peptides.",
                    "They alter the reading frame to increase genetic diversity.",
                    "They act as promoters for RNA Polymerase II."
                ],
                correct: 0,
                tip: "The 5' cap and 3' poly(A) tail stabilize mRNA against degradation, assist transport out of the nucleus, and serve as recognition signals for translation initiation factors."
            });
        }
    }

    return pool;
}

// Initialize complete question database
const masterQuestionPool = generateQuestionPool();

// App State
let currentQuestions = [];
let currentIndex = 0;
let score = 0;

// DOM Elements
const selectionCard = document.getElementById('selection-card');
const quizCard = document.getElementById('quiz-card');
const summaryCard = document.getElementById('summary-card');
const unitSelect = document.getElementById('unit-select');
const startBtn = document.getElementById('start-btn');
const unitBadge = document.getElementById('unit-badge');
const qCurrent = document.getElementById('q-current');
const qTotal = document.getElementById('q-total');
const scoreEl = document.getElementById('score');
const questionEl = document.getElementById('question');
const optionsEl = document.getElementById('options');
const feedbackEl = document.getElementById('feedback');
const tipEl = document.getElementById('tip');
const nextBtn = document.getElementById('next-btn');
const restartBtn = document.getElementById('restart-btn');

// Event Listeners
startBtn.addEventListener('click', startQuiz);
nextBtn.addEventListener('click', loadNextQuestion);
restartBtn.addEventListener('click', resetToSelection);

function startQuiz() {
    const selectedUnit = unitSelect.value;
    
    if (selectedUnit === 'all') {
        // Collect 200 questions across all units (40 from each of the 5 units)
        currentQuestions = [];
        for (let u = 1; u <= 5; u++) {
            const shuffledUnit = [...masterQuestionPool[u]].sort(() => Math.random() - 0.5);
            currentQuestions.push(...shuffledUnit.slice(0, 40));
        }
        currentQuestions.sort(() => Math.random() - 0.5); // Final shuffle
    } else {
        // Select 100 questions for the single unit
        const u = parseInt(selectedUnit);
        currentQuestions = [...masterQuestionPool[u]].sort(() => Math.random() - 0.5).slice(0, 100);
    }

    currentIndex = 0;
    score = 0;

    selectionCard.classList.add('hidden');
    summaryCard.classList.add('hidden');
    quizCard.classList.remove('hidden');

    renderQuestion();
}

function renderQuestion() {
    resetState();

    const q = currentQuestions[currentIndex];
    unitBadge.textContent = `Unit ${q.unit}`;
    qCurrent.textContent = currentIndex + 1;
    qTotal.textContent = currentQuestions.length;
    scoreEl.textContent = score;

    questionEl.textContent = q.question;

    q.options.forEach((optText, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = `${String.fromCharCode(65 + idx)}. ${optText}`;
        btn.addEventListener('click', () => selectOption(idx));
        optionsEl.appendChild(btn);
    });
}

function resetState() {
    feedbackEl.className = 'feedback-box';
    feedbackEl.textContent = '';
    tipEl.className = 'tip-box';
    tipEl.textContent = '';
    nextBtn.classList.remove('visible');
    optionsEl.innerHTML = '';
}

function selectOption(selectedIdx) {
    const q = currentQuestions[currentIndex];
    const optionBtns = optionsEl.children;

    // Disable all options after selection
    for (let btn of optionBtns) {
        btn.disabled = true;
    }

    if (selectedIdx === q.correct) {
        score++;
        scoreEl.textContent = score;
        optionBtns[selectedIdx].classList.add('correct');
        feedbackEl.textContent = "Correct! Excellent mastery of concept.";
        feedbackEl.className = "feedback-box visible correct";
    } else {
        optionBtns[selectedIdx].classList.add('wrong');
        optionBtns[q.correct].classList.add('correct');
        feedbackEl.textContent = `Incorrect. The correct answer is Option ${String.fromCharCode(65 + q.correct)}.`;
        feedbackEl.className = "feedback-box visible wrong";
    }

    // Show Memory Tip
    tipEl.innerHTML = `<strong>Memory Tip:</strong> ${q.tip}`;
    tipEl.className = "tip-box visible";

    nextBtn.classList.add('visible');
}

function loadNextQuestion() {
    currentIndex++;
    if (currentIndex < currentQuestions.length) {
        renderQuestion();
    } else {
        showSummary();
    }
}

function showSummary() {
    quizCard.classList.add('hidden');
    summaryCard.classList.remove('hidden');

    document.getElementById('final-score').textContent = score;
    document.getElementById('final-total').textContent = currentQuestions.length;
    const percent = Math.round((score / currentQuestions.length) * 100);
    document.getElementById('final-percent').textContent = `${percent}%`;
}

function resetToSelection() {
    summaryCard.classList.add('hidden');
    selectionCard.classList.remove('hidden');
}
</script>
</body>
</html>
